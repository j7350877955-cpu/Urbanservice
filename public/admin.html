<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f1f5f9; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #4f46e5; color: white; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Admin Control Panel</h1>

    <div class="card">
        <h2>Customer Bookings</h2>
        <table id="bookingTable">
            <thead><tr><th>Name</th><th>Service</th><th>Phone</th><th>Address</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Registered Workers</h2>
        <table id="workerTable">
            <thead><tr><th>Name</th><th>Service</th><th>Phone</th><th>Rating</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function loadAdminData() {
            try {
                const res = await fetch('/api/admin/data');
                const data = await res.json();

                // Load Bookings
                const bBody = document.querySelector("#bookingTable tbody");
                bBody.innerHTML = data.bookings.map(b => `
                    <tr><td>${b.name}</td><td>${b.service}</td><td>${b.phone}</td><td>${b.address}</td></tr>
                `).join('');

                // Load Workers
                const wBody = document.querySelector("#workerTable tbody");
                wBody.innerHTML = data.workers.map(w => `
                    <tr><td>${w.name}</td><td>${w.service}</td><td>${w.phone}</td><td>${w.rating}</td></tr>
                `).join('');

            } catch (err) { console.error("Admin Load Error:", err); }
        }
        window.onload = loadAdminData;
    </script>
</body>
</html>
