<!DOCTYPE html>
<html>
<head><title>Admin Panel</title><style>body{font-family:sans-serif;padding:40px;background:#f1f5f9} .box{background:white;padding:20px;border-radius:10px;margin-bottom:20px} table{width:100%;border-collapse:collapse} th,td{text-align:left;padding:10px;border-bottom:1px solid #eee}</style></head>
<body>
    <h1>Admin Dashboard</h1>
    <div class="box">
        <h2>Active Bookings</h2>
        <table id="bt"><thead><tr><th>Customer</th><th>Service</th><th>Phone</th><th>Address</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="box">
        <h2>Professional Applications</h2>
        <table id="at"><thead><tr><th>Name</th><th>Skill</th><th>Phone</th></tr></thead><tbody></tbody></table>
    </div>
    <script>
        async function load() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            document.querySelector("#bt tbody").innerHTML = data.bookings.map(b => `<tr><td>${b.name}</td><td>${b.service}</td><td>${b.phone}</td><td>${b.address}</td></tr>`).join('');
            document.querySelector("#at tbody").innerHTML = data.apps.map(a => `<tr><td>${a.name}</td><td>${a.service}</td><td>${a.phone}</td></tr>`).join('');
        }
        window.onload = load;
    </script>
</body>
</html>
